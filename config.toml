# Base configuration
baseURL = "/"
languageCode = "en-US"
title = "Graham Plata"
theme = "etch"
googleAnalytics = "UA-11254643-2"
enableInlineShortcodes = true
pygmentsCodeFences = true
pygmentsUseClasses = true

timeout = "120000ms" # Increase timeout to 120 seconds

staticDir = ["static"]

# Image processing settings
[imaging]
resampleFilter = "lanczos"
quality = 85
anchor = "smart"
bgColor = "#ffffff"
hint = "photo"
# Enable EXIF data processing
exif.disableDate = false
exif.disableLatLong = false
exif.excludeFields = "GPS"

# Image format specific settings
[imaging.formats]
[imaging.formats.webp]
quality = 85
lossless = false
[imaging.formats.jpeg]
quality = 85
progressive = true
[imaging.formats.png]
compressionLevel = 6

[params]
description = "Graham Plata's Digital Sandbox"
copyright = "Copyright © 2025 Graham Plata"
dark = "auto"
highlight = true
showPageTitleInTOC = false

[markup.goldmark.renderer]
unsafe = true

[markup.tableOfContents]
ordered = true

[menu]
[[menu.main]]
identifier = "about"
name = "about"
title = "about"
url = "/about/"
weight = 10

[[menu.main]]
identifier = "posts"
name = "posts"
title = "posts"
url = "/posts/"
weight = 20

[permalinks]
posts = "/posts/:title/"
