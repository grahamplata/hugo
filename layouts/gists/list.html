{{- define "main" -}}
<main>
    <div class="posts">
        {{- range .Data.Pages -}}
        <article>
            <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
            {{- if .Description }}
            <p class="description">{{ .Description }}</p>
            {{- end }}
            {{- if .Params.language }}
            <span class="language">{{ .Params.language }}</span>
            {{- end }}
        </article>
        {{- end }}
    </div>
</main>
{{- end }}
